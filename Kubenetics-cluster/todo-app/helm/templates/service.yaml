apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-app.fullname" . }}
  labels:
    app: {{ include "todo-app.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}        # This should reference the port in values.yaml
      targetPort: {{ .Values.service.port }}   # Set the targetPort to the same as the port inside the container
      protocol: TCP
  selector:
    app: {{ include "todo-app.name" . }}
    release: {{ .Release.Name }}
